name: Supabase keepalive

on:
  schedule:
    # Fixed, intentionally irregular UTC times with gaps of two to three days.
    - cron: "17 6 * * 1"
    - cron: "43 18 * * 3"
    - cron: "29 11 * * 6"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call isolated Supabase keepalive RPC
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "::error::Missing SUPABASE_URL or SUPABASE_ANON_KEY repository secret."
            exit 1
          fi

          response="$(
            curl --silent --show-error --fail \
              --max-time 30 \
              --request POST \
              --header "apikey: ${SUPABASE_ANON_KEY}" \
              --header "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
              --header "Content-Type: application/json" \
              --data '{}' \
              "${SUPABASE_URL%/}/rest/v1/rpc/keepalive"
          )"

          echo "${response}" | jq -e '.ok == true' >/dev/null
          echo "Supabase keepalive completed successfully."
